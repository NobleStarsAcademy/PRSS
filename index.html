<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Noble Stars Academy - Basic Digital Literacy 2025/2026 Pupil's Report Sheet">
    <title>Noble Stars Academy | Pupil's Report Sheet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

    <!-- Animated Background Elements -->
    <div class="absolute inset-0 bg-gradient-to-br from-blue-700 via-blue-600 to-fuchsia-600 animate-gradient"></div>
    <div class="absolute inset-0 bg-[url('data:image/svg+xml,%3Csvg width=\'60\' height=\'60\' viewBox=\'0 0 60 60\' xmlns=\'http://www.w3.org/2000/svg\'%3E%3Cg fill=\'none\' fill-rule=\'evenodd\'%3E%3Cg fill=\'%23ffffff\' fill-opacity=\'0.05\'%3E%3Cpath d=\'M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z\'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E')] opacity-30"></div>
    
    <!-- Floating Shapes -->
    <div class="absolute top-20 left-10 w-32 h-32 bg-white/10 rounded-full blur-2xl animate-float"></div>
    <div class="absolute bottom-20 right-10 w-48 h-48 bg-fuchsia-400/20 rounded-full blur-3xl animate-float-delayed"></div>

    <!-- Main Container -->
    <main class="relative w-full max-w-md animate-fade-in-up">
        
        <!-- Glass Card -->
        <div class="glass-card rounded-3xl shadow-2xl overflow-hidden border border-white/20 backdrop-blur-xl">
            
            <!-- Header Section -->
            <div class="relative px-8 pt-10 pb-6 text-center bg-gradient-to-b from-white/10 to-transparent">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-white shadow-lg mb-4 transform hover:scale-105 transition-transform duration-300">
                    <img src="nsa.png" alt="School Logo" class="w-12 h-12 object-contain">
                </div>
                <h1 class="font-['Playfair_Display'] text-3xl font-bold text-white mb-1 tracking-tight">
                    Noble Stars
                </h1>
                <p class="text-blue-100 text-sm font-medium tracking-wider uppercase">Academy</p>
                <div class="mt-4 inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-white/20 border border-white/30 text-white text-xs font-semibold">
                    <i data-lucide="calendar" class="w-3.5 h-3.5"></i>
                    2025/2026 Session
                </div>
            </div>

            <!-- Form Section -->
            <div class="px-8 py-6">
                <div class="text-center mb-6">
                    <h2 class="text-white font-semibold text-lg">Pupil's Report Sheet System</h2>
                    <p class="text-blue-100 text-sm mt-1">Basic Digital Literacy</p>
                </div>

                <form id="loginForm" class="space-y-5" novalidate>
                    
                    <!-- Surname Input -->
                    <div class="space-y-2">
                        <label for="surname" class="block text-xs font-semibold text-white/90 uppercase tracking-wider ml-1">
                            Surname
                        </label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i data-lucide="user" class="w-5 h-5 text-gray-400 group-focus-within:text-blue-600 transition-colors"></i>
                            </div>
                            <input 
                                type="text" 
                                id="surname" 
                                name="surname" 
                                required
                                autocomplete="family-name"
                                class="w-full pl-12 pr-4 py-3.5 bg-fuchsia-200 border-2 border-transparent rounded-xl text-gray-900 placeholder-gray-400 focus:outline-none focus:border-fuchsia-500 focus:ring-4 focus:ring-fuchsia-500/20 transition-all duration-300 font-medium"
                                placeholder="Enter your surname"
                            >
                        </div>
                        <p id="surnameError" class="hidden text-fuchsia-300 text-xs ml-1 flex items-center gap-1">
                            <i data-lucide="alert-circle" class="w-3 h-3"></i>
                            <span>Please enter your surname</span>
                        </p>
                    </div>

                    <!-- Class Selection -->
                    <div class="space-y-2">
                        <label for="classSelect" class="block text-xs font-semibold text-white/90 uppercase tracking-wider ml-1">
                            Select Class
                        </label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i data-lucide="users" class="w-5 h-5 text-gray-400 group-focus-within:text-blue-600 transition-colors"></i>
                            </div>
                            <select 
                                id="classSelect" 
                                name="class" 
                                required
                                class="w-full pl-12 pr-10 py-3.5 bg-fuchsia-200 border-2 border-transparent rounded-xl text-gray-900 focus:outline-none focus:border-fuchsia-500 focus:ring-4 focus:ring-fuchsia-500/20 transition-all duration-300 font-medium appearance-none cursor-pointer"
                            >
                                <option value="" disabled selected>Choose your class</option>
                                <option value="Primary2">Primary 2</option>
                                <option value="Primary3">Primary 3</option>
                                <option value="Primary4">Primary 4</option>
                                <option value="Primary5">Primary 5</option>
                                <option value="Other">Other</option>
                            </select>
                            <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none">
                                <i data-lucide="chevron-down" class="w-5 h-5 text-gray-400"></i>
                            </div>
                        </div>
                        <p id="classError" class="hidden text-fuchsia-300 text-xs ml-1 flex items-center gap-1">
                            <i data-lucide="alert-circle" class="w-3 h-3"></i>
                            <span>Please select your class</span>
                        </p>
                    </div>

                    <!-- Access Button -->
                    <button 
                        type="submit" 
                        id="accessBtn"
                        class="w-full mt-6 group relative flex items-center justify-center gap-2 py-4 px-6 bg-gradient-to-r from-fuchsia-400 to-fuchsia-600 hover:from-fuchsia-600 hover:to-fuchsia-700 text-white font-bold rounded-xl shadow-lg shadow-blue-600/30 transform transition-all duration-300 hover:scale-[1.02] hover:shadow-xl active:scale-[0.98] focus:outline-none focus:ring-4 focus:ring-fuchsia-500/30"
                    >
                        <span id="btnText">Access Report</span>
                        <i data-lucide="arrow-right" class="w-5 h-5 transition-transform group-hover:translate-x-1" id="btnIcon"></i>
                        <div id="btnLoader" class="hidden absolute inset-0 flex items-center justify-center bg-inherit rounded-xl">
                            <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                        </div>
                    </button>

                </form>

                <!-- Success/Error Message Container -->
                <div id="messageContainer" class="hidden mt-4 p-4 rounded-xl bg-white/10 border border-white/20 text-center animate-fade-in">
                    <p id="messageText" class="text-white text-sm font-medium"></p>
                </div>
            </div>

            <!-- Footer -->
            <div class="px-8 py-4 bg-fuchsia-500 border-t border-white/10 text-center">
                <p class="text-white/60 text-xs">
                    © 2026 FJ CodeSprout Academy. All rights reserved.
                </p>
                <div class="mt-2 flex justify-center gap-4">
                    <a href="https://wa.me/2348146233634" class="text-white/40 hover:text-white transition-colors" aria-label="Help">
                        <i data-lucide="message-circle" class="w-4 h-4"></i>
                    </a>
                    <a href="mailto:abegundefaithjane@gmail.com" class="text-white/40 hover:text-white transition-colors" aria-label="Contact">
                        <i data-lucide="mail" class="w-4 h-4"></i>
                    </a>
                    <a href="tel:+2348146233634" class="text-white/40 hover:text-white transition-colors" aria-label="Security">
                        <i data-lucide="phone" class="w-4 h-4"></i>
                    </a>
                </div>
            </div>
        </div>

        <!-- Accessibility Notice -->
        <div class="mt-6 text-center animate-fade-in-delayed">
            <p class="text-white/60 text-xs flex items-center justify-center gap-2">
                <i data-lucide="lock" class="w-3 h-3"></i>
                Secure SSL Encrypted Connection
            </p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
